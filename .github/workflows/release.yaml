# Oddsmaker Control Service - Release Workflow
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/control-service
  JAVA_VERSION: '21'

jobs:
  # Job 1: Validate Release
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Validate version format
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

  # Job 2: Build and Test
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.7'
          arguments: |
            --no-daemon
            :services:control-service:test

      - name: Build application
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.7'
          arguments: |
            --no-daemon
            :services:control-service:bootJar

      - name: Build Superset bundle asset
        run: |
          cd bi/superset
          ./build_bundle.sh || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: control-service-jar
          path: services/control-service/build/libs/*.jar

      - name: Upload Superset bundle
        uses: actions/upload-artifact@v4
        with:
          name: superset-bundle
          path: bi/superset/playtics_dashboard_bundle.zip
          if-no-files-found: ignore

  # Job 3: Build and Push Docker Image
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: control-service-jar
          path: services/control-service/build/libs/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/control-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 4: Deploy to Production
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: production
      url: https://control.oddsmaker.local
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to production
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/postgres.yaml
          kubectl apply -f deploy/k8s/redis.yaml
          kubectl apply -f deploy/k8s/control-service.yaml
          kubectl set image deployment/oddsmaker-control control-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} -n oddsmaker
          kubectl rollout status deployment/oddsmaker-control -n oddsmaker --timeout=300s

      - name: Verify deployment
        run: |
          sleep 30
          curl -f https://control.oddsmaker.local/actuator/health || exit 1
          echo "Production deployment successful!"

  # Job 5: Create GitHub Release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: control-service-jar
          path: release/

      - name: Download Superset bundle
        uses: actions/download-artifact@v4
        with:
          name: superset-bundle
          path: release/
        continue-on-error: true

      - name: Pick release notes file
        id: pick
        run: |
          VER="${GITHUB_REF_NAME}"
          if [ -f "docs/release-notes/${VER}.md" ]; then
            echo "body=docs/release-notes/${VER}.md" >> $GITHUB_OUTPUT
          else
            echo "body=CHANGELOG.md" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.jar
            release/playtics_dashboard_bundle.zip
          body_path: ${{ steps.pick.outputs.body }}
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
