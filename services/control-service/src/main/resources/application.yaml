server:
  port: 8085

spring:
  application:
    name: control-service

  # 数据库配置
  datasource:
    # 开发环境：使用H2内存数据库
    url: jdbc:h2:file:./var/controldb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=true
    driverClassName: org.h2.Driver
    username: sa
    password:

    # 生产环境配置示例（通过环境变量覆盖）
    # url: jdbc:postgresql://localhost:5432/oddsmaker_control
    # driverClassName: org.postgresql.Driver
    # username: ${DB_USERNAME:oddsmaker_user}
    # password: ${DB_PASSWORD:oddsmaker_password}

  jpa:
    hibernate:
      ddl-auto: update  # 开发环境自动更新表结构
      # ddl-auto: validate  # 生产环境建议使用validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.H2Dialect  # 开发环境
        # dialect: org.hibernate.dialect.PostgreSQLDialect  # 生产环境
        format_sql: true
        show_sql: false  # 设为true可在开发时查看SQL
    show-sql: false

  # 多环境配置支持
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}

  flyway:
    enabled: false

  # 安全配置
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin123}

# Oddsmaker 平台配置
oddsmaker:
  admin:
    # 管理令牌 - 生产环境必须更换
    token: ${ODDSMAKER_ADMIN_TOKEN:admin}

  company:
    # 单公司部署元信息
    name: ${ODDSMAKER_COMPANY_NAME:Oddsmaker Studio}
    deployment-id: ${ODDSMAKER_DEPLOYMENT_ID:local}
    default-timezone: ${ODDSMAKER_DEFAULT_TIMEZONE:Asia/Shanghai}
    data-region: ${ODDSMAKER_DATA_REGION:cn}

  # 邀请配置
  invitation:
    expire-hours: 72                   # 邀请链接72小时过期
    base-url: ${ODDSMAKER_BASE_URL:http://localhost:8085}

  # 安全配置
  security:
    jwt:
      secret: ${JWT_SECRET:oddsmaker-jwt-secret-key-change-in-production}
      expiration: 86400000             # 24小时 (毫秒)
    api-key:
      default-rotation-days: 90        # API密钥默认90天轮换
    password:
      min-length: 8
      require-special-chars: true
      require-numbers: true

# 监控和健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# 日志配置
logging:
  level:
    io.oddsmaker: DEBUG                      # 开发环境详细日志
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: production

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:oddsmaker_control}
    driverClassName: org.postgresql.Driver
    username: ${DB_USERNAME:oddsmaker_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate               # 生产环境不自动修改表结构
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        show_sql: false
    show-sql: false

logging:
  level:
    io.oddsmaker: INFO                       # 生产环境标准日志级别
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: /var/log/oddsmaker/control-service.log

---
# 测试环境配置
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop            # 测试环境每次重新创建表
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true

logging:
  level:
    io.oddsmaker: DEBUG
    org.springframework.security: DEBUG
