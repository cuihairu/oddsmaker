server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

oddsmaker:
  kafka:
    bootstrap: localhost:9092
    topic: oddsmaker.events_raw
    registry-url: http://localhost:8081/apis/registry/v2
    dlq-topic: oddsmaker.deadletter
    producer:
      linger-ms: 5
      batch-size: 65536
  auth:
    # 示例: apiKey->secret，生产请使用数据库/控制面
    keys:
      pk_test_example: sk_test_secret
      pk_test_rl: sk_test_secret
      pk_test_pii: sk_test_secret
      pk_iprl: sk_test_secret
      pk_deny: sk_test_secret
      pk_mask: sk_test_secret
      pk_ipv6: sk_test_secret
      pk_clamp: sk_test_secret
  ratelimit:
    rpm: 600          # per api key per minute
    ip-rpm: 300        # per client IP per minute
  control:
    url: http://localhost:8085
  props:
    allowlist: []   # 示例: [level,stars,amount,currency,exp,variant]
  event:
    max-bytes: 65536
  request:
    max-bytes: 1048576
  pii:
    email: mask      # mask|drop|allow
    phone: mask      # mask|drop|allow
    ip: coarse       # coarse|drop|allow  (coarse: IPv4 /24, IPv6 /48)
    deny-keys: [password, pass, passwd, credit_card, ssn]
    mask-keys: [email, phone, mobile]
